name: Release CI (main only)

on:
  push:
    branches:
      - main
    paths:
      - 'Void.lagda.tex'
      - '.github/workflows/release-ci.yml'

permissions:
  contents: write
  id-token: write
  attestations: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Agda
        uses: wenkokke/setup-agda@v2
        with:
          agda-version: '2.7.0.1'

      - name: Verify Agda (--safe --without-K)
        run: |
          set -e
          agda --safe --without-K Void.lagda.tex 2>&1 | tee agda-compile.log
          echo "Agda verification passed"



      - name: Create verification manifest
        run: |
          {
            echo "=== VOID VERIFICATION MANIFEST ==="
            echo "Timestamp: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
            echo "Commit: ${{ github.sha }}"
            echo "Agda Version: 2.7.0.1"
            echo "Flags: --safe --without-K"
            echo ""
            echo "=== AGDA OUTPUT ==="
            cat agda-compile.log
            echo ""
            echo "=== CHECKSUMS ==="
            sha256sum Void.lagda.tex
            sha256sum Void.agdai 2>/dev/null || true
          } > verification-manifest.txt

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: |
            Void.agdai
            verification-manifest.txt
            agda-compile.log

  release:
    name: Create release
    needs: verify-and-build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-artifacts
          path: artifacts/

      - name: Compute SHORT_SHA
        id: sha
        run: echo "short=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Fetch tags
        run: git fetch --tags --force

      - name: Compute changelog
        id: changelog
        shell: bash
        run: |
          set -euo pipefail
          PREV_TAG="$(git describe --tags --abbrev=0 2>/dev/null || true)"
          {
            echo "## Void — ${{ steps.sha.outputs.short }}"
            echo ""
            echo "A machine-verified derivation from logical distinction to K₄,"
            echo "compiled under \`--safe --without-K\`."
            echo ""
            echo "### Included"
            echo "- **Void.agdai** — compiled Agda interfaces"
            echo "- **verification-manifest.txt** — build provenance"
            echo ""
            if [ -n "$PREV_TAG" ]; then
              echo "### Changes since $PREV_TAG"
              echo ""
              git log --no-decorate --pretty=format:'- %s (%h)' "${PREV_TAG}..HEAD"
              echo ""
            fi
            echo "---"
            echo ""
            echo "**Verify locally:**"
            echo "\`\`\`"
            echo "agda --safe --without-K Void.lagda.tex"
            echo "\`\`\`"
          } > CHANGELOG.md

      - name: Create source archive
        run: git archive -o vaf-${{ steps.sha.outputs.short }}.zip HEAD

      - name: Attest Build Provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            vaf-${{ steps.sha.outputs.short }}.zip
            artifacts/Void.agdai
            artifacts/verification-manifest.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: "Void v${{ github.run_number }} (${{ steps.sha.outputs.short }})"
          body_path: CHANGELOG.md
          draft: false
          prerelease: false
          files: |
            vaf-${{ steps.sha.outputs.short }}.zip
            artifacts/Void.agdai
            artifacts/verification-manifest.txt
