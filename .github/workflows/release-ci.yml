name: Agda CI

on:
  push:
    branches: [main]
    paths:
      - 'Void.lagda.tex'
      - 'Form.lagda.tex'
      - '.github/workflows/release-ci.yml'

concurrency:
  group: agda-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-void:
    name: Verify Void
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: wenkokke/setup-agda@v2
        with:
          agda-version: '2.7.0.1'

      - name: Verify Void (--safe --without-K)
        run: agda --safe --without-K Void.lagda.tex

      - name: Upload Void.agdai
        uses: actions/upload-artifact@v4
        with:
          name: void-agdai
          path: Void.agdai

  verify-form:
    name: Verify Form
    needs: verify-void
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: wenkokke/setup-agda@v2
        with:
          agda-version: '2.7.0.1'

      - name: Download Void.agdai
        uses: actions/download-artifact@v4
        with:
          name: void-agdai

      - name: Mark Void.agdai as up-to-date
        run: touch Void.agdai

      - name: Verify Form (--safe --without-K)
        run: agda --safe --without-K Form.lagda.tex
