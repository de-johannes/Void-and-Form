name: Release CI (main only)

on:
  push:
    branches:
      - main
    paths:
      - 'FirstDistinction.lagda.tex'
      - '.github/workflows/release-ci.yml'

permissions:
  contents: write
  id-token: write
  attestations: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Agda
        uses: wenkokke/setup-agda@v2
        with:
          agda-version: '2.7.0.1'

      - name: Install XeLaTeX and PDF tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            texlive-xetex \
            texlive-fonts-extra \
            texlive-latex-extra \
            texlive-fonts-recommended \
            texlive-plain-generic \
            poppler-utils

      - name: Check for holes
        run: |
          if grep -n '{!.*!}' FirstDistinction.lagda.tex; then
            echo "::error::Holes found — cannot release"
            exit 1
          fi

      - name: Verify Agda (--safe --without-K)
        run: |
          set -e
          agda --safe --without-K --no-libraries FirstDistinction.lagda.tex 2>&1 \
            | tee agda-compile.log
          echo "Agda verification passed"

      - name: Build PDF
        run: |
          set -e
          agda --latex FirstDistinction.lagda.tex
          cd latex
          # Two passes for cross-references
          xelatex -interaction=nonstopmode FirstDistinction.tex
          xelatex -interaction=nonstopmode FirstDistinction.tex
          cp FirstDistinction.pdf ../FirstDistinction.pdf
          echo "PDF built ($(wc -c < FirstDistinction.pdf) bytes)"

      - name: Page count
        run: |
          PAGES=$(pdfinfo FirstDistinction.pdf 2>/dev/null | awk '/^Pages:/{print $2}' || echo "?")
          echo "pages=${PAGES}" >> "$GITHUB_ENV"
          echo "PDF has ${PAGES} pages"

      - name: Create verification manifest
        run: |
          {
            echo "=== FIRST DISTINCTION VERIFICATION MANIFEST ==="
            echo "Timestamp: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
            echo "Commit: ${{ github.sha }}"
            echo "Agda Version: 2.7.0.1"
            echo "Flags: --safe --without-K --no-libraries"
            echo "Pages: ${pages:-unknown}"
            echo ""
            echo "=== AGDA OUTPUT ==="
            cat agda-compile.log
            echo ""
            echo "=== CHECKSUMS ==="
            sha256sum FirstDistinction.lagda.tex
            sha256sum FirstDistinction.pdf
            sha256sum FirstDistinction.agdai 2>/dev/null || true
          } > verification-manifest.txt

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: |
            FirstDistinction.pdf
            FirstDistinction.agdai
            verification-manifest.txt
            agda-compile.log

  release:
    name: Create release
    needs: verify-and-build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-artifacts
          path: artifacts/

      - name: Compute SHORT_SHA
        id: sha
        run: echo "short=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Fetch tags
        run: git fetch --tags --force

      - name: Compute changelog
        id: changelog
        shell: bash
        run: |
          set -euo pipefail
          PREV_TAG="$(git describe --tags --abbrev=0 2>/dev/null || true)"
          {
            echo "## First Distinction — ${{ steps.sha.outputs.short }}"
            echo ""
            echo "A machine-verified derivation from logical distinction to K₄,"
            echo "compiled under \`--safe --without-K\` with no libraries."
            echo ""
            echo "### Included"
            echo "- **FirstDistinction.pdf** — the complete book"
            echo "- **FirstDistinction.agdai** — compiled Agda interface"
            echo "- **verification-manifest.txt** — build provenance"
            echo ""
            if [ -n "$PREV_TAG" ]; then
              echo "### Changes since $PREV_TAG"
              echo ""
              git log --no-decorate --pretty=format:'- %s (%h)' "${PREV_TAG}..HEAD"
              echo ""
            fi
            echo "---"
            echo ""
            echo "**Verify locally:**"
            echo "\`\`\`"
            echo "agda --safe --without-K --no-libraries FirstDistinction.lagda.tex"
            echo "\`\`\`"
          } > CHANGELOG.md

      - name: Create source archive
        run: git archive -o fd-${{ steps.sha.outputs.short }}.zip HEAD

      - name: Attest Build Provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            fd-${{ steps.sha.outputs.short }}.zip
            artifacts/FirstDistinction.pdf
            artifacts/FirstDistinction.agdai
            artifacts/verification-manifest.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: "First Distinction v${{ github.run_number }} (${{ steps.sha.outputs.short }})"
          body_path: CHANGELOG.md
          draft: false
          prerelease: false
          files: |
            artifacts/FirstDistinction.pdf
            fd-${{ steps.sha.outputs.short }}.zip
            artifacts/verification-manifest.txt
            artifacts/FirstDistinction.agdai
